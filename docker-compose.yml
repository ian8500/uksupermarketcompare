version: '3.9'
services:
  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: basketcompare
      POSTGRES_USER: basket
      POSTGRES_PASSWORD: password
    ports: ["5432:5432"]
    volumes: ["pgdata:/var/lib/postgresql/data"]

  redis:
    image: redis:7
    ports: ["6379:6379"]

  api:
    build: ./backend
    environment:
      DATABASE_URL: postgresql+psycopg2://basket:password@postgres:5432/basketcompare
      REDIS_URL: redis://redis:6379/0
    ports: ["8000:8000"]
    depends_on: [postgres, redis]
    volumes:
      - ./backend:/app
      - ./ingestion:/app/ingestion

  ingestion:
    build: ./backend
    command: bash -c "PYTHONPATH=/app:/app/ingestion python /app/ingestion/app/ingest.py"
    environment:
      DATABASE_URL: postgresql+psycopg2://basket:password@postgres:5432/basketcompare
    depends_on: [api]
    volumes:
      - ./backend:/app
      - ./ingestion:/app/ingestion

  worker:
    build: ./backend
    command: bash -c "celery -A matching.app.tasks.celery_app worker --loglevel=info"
    environment:
      DATABASE_URL: postgresql+psycopg2://basket:password@postgres:5432/basketcompare
      REDIS_URL: redis://redis:6379/0
    depends_on: [api, redis]
    volumes:
      - ./backend:/app
      - ./matching:/app/matching

  frontend:
    build: ./frontend
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
    ports: ["3000:3000"]
    depends_on: [api]

volumes:
  pgdata:
